<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Iterate.log — 日々の学びを積み重ねるポートフォリオサイト" />
  <title>{% block title %}Iterate.log{% endblock %}</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Oswald:wght@600;700;800&family=Space+Grotesk:wght@700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    /* ── CSS Custom Properties ─────────────────────────────── */
    :root {
      /* Sharp (Slate/Professional) - Default */
      --color-bg:        #FFFFFF;
      --color-bg-soft:   #F1F5F9;
      --color-bg-card:   #FFFFFF;
      --color-text:      #0F172A;
      --color-text-soft: #475569;
      --color-accent:    #10B981;
      --color-accent-soft: #10B981;
      --color-accent-rgb: 16, 185, 129;
      --color-border:    #E2E8F0;
      --color-border-light: #E2E8F0;
      --color-pattern-1: rgba(30, 41, 59, 0.06);
      --color-pattern-2: rgba(30, 41, 59, 0.04);

      --font-heading: 'Inter', 'Noto Sans JP', sans-serif;
      --font-body: 'Inter', 'Noto Sans JP', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-mono: 'JetBrains Mono', 'SF Mono', monospace;
      --max-width: 720px;
      --radius-sm: 0px;
      --radius-md: 0px;
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.06);
      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    [data-theme='dark'] {
      /* Dark/ZETA (Cyberpunk/Street) */
      --color-bg:        #000000;
      --color-bg-soft:   #111111;
      --color-bg-card:   #111111;
      --color-text:      #FFFFFF;
      --color-text-soft: #888888;
      --color-accent:    #D4F700;
      --color-accent-soft: #D4F700;
      --color-accent-rgb: 212, 247, 0;
      --color-border:    #333333;
      --color-border-light: #222222;
      --color-pattern-1: rgba(212, 247, 0, 0.08);
      --color-pattern-2: rgba(212, 247, 0, 0.05);

      --font-heading: 'Inter', 'Noto Sans JP', sans-serif;
      --radius-sm: 0px;
      --radius-md: 0px;
    }

    /* ── ZETA Theme Overrides ────────────────────────────── */
    [data-theme='dark'] .work-card:hover {
      background: var(--color-bg-soft);
      border-color: var(--color-accent);
    }

    [data-theme='dark'] .site-nav {
      background: rgba(0, 0, 0, 0.9);
      border-bottom: 2px solid var(--color-accent);
    }

    /* ── Reset & Base ──────────────────────────────────────── */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font-body);
      color: var(--color-text);
      background-color: var(--color-bg);
      background-image:
        linear-gradient(135deg, var(--color-pattern-1) 1px, transparent 1px),
        linear-gradient(315deg, var(--color-pattern-2) 1px, transparent 1px);
      background-size: 28px 28px;
      line-height: 1.6;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Navigation ────────────────────────────────────────── */
    .site-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--color-border);
    }

    .site-nav__inner {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .site-nav__logo {
      font-size: 1.15rem;
      font-weight: 700;
      font-family: var(--font-heading);
      color: var(--color-text);
      text-decoration: none;
      letter-spacing: -0.02em;
      transition: color var(--transition);
    }

    .site-nav__logo span {
      color: var(--color-accent);
    }

    .site-nav__logo:hover {
      color: var(--color-accent);
    }

    .site-nav__links {
      display: flex;
      gap: 24px;
      list-style: none;
    }

    .site-nav__links a {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--color-text-soft);
      text-decoration: none;
      position: relative;
      transition: color var(--transition);
    }

    .site-nav__links a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--color-accent);
      border-radius: 0;
      transition: width var(--transition);
    }

    .site-nav__links a:hover {
      color: var(--color-text);
    }

    .site-nav__links a:hover::after {
      width: 100%;
    }

    /* ── Main Content ──────────────────────────────────────── */
    .site-main {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 48px 24px 96px;
      animation: fadeInUp 0.6s ease-out;
      position: relative;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── Footer ────────────────────────────────────────────── */
    .site-footer {
      text-align: center;
      padding: 32px 24px;
      font-size: 0.8rem;
      color: var(--color-text-soft);
      border-top: 1px solid var(--color-border-light);
    }

    .site-footer a {
      color: var(--color-accent);
      text-decoration: none;
    }

    /* ── Responsive ────────────────────────────────────────── */
    @media (max-width: 640px) {
      .site-nav__inner {
        padding: 0 16px;
      }

      .site-main {
        padding: 32px 16px 64px;
      }

      .site-nav__links {
        gap: 16px;
      }
    }

    /* ── Theme Toggle ────────────────────────────────────── */
    .theme-toggle {
      background: none;
      border: 1px solid var(--color-border);
      color: var(--color-text-soft);
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all var(--transition);
      padding: 0;
    }

    .theme-toggle:hover {
      border-color: var(--color-accent);
      color: var(--color-accent);
      background: var(--color-bg-soft);
    }

    .theme-toggle svg {
      width: 16px;
      height: 16px;
    }

    [data-theme='dark'] .theme-toggle__icon-sharp { display: none; }
    html:not([data-theme='dark']) .theme-toggle__icon-dark { display: none; }
    /* ── Markdown Heading Icons ────────────────────────── */
    [class*="icon-"]::before {
      content: '';
      display: inline-block;
      width: 1.6em;
      height: 1.6em;
      vertical-align: -0.18em;
      margin-right: 0.6em;
      background-color: var(--color-accent);
      -webkit-mask-size: contain;
      mask-size: contain;
      -webkit-mask-repeat: no-repeat;
      mask-repeat: no-repeat;
      -webkit-mask-position: center;
      mask-position: center;
    }

    .icon-video::before { -webkit-mask-image: url(/static/svg/video.svg); mask-image: url(/static/svg/video.svg); }
    .icon-rocket::before { -webkit-mask-image: url(/static/svg/rocket.svg); mask-image: url(/static/svg/rocket.svg); }
    .icon-globe::before { -webkit-mask-image: url(/static/svg/globe.svg); mask-image: url(/static/svg/globe.svg); }
    .icon-controller::before { -webkit-mask-image: url(/static/svg/controller.svg); mask-image: url(/static/svg/controller.svg); }
    .icon-shield::before { -webkit-mask-image: url(/static/svg/shield.svg); mask-image: url(/static/svg/shield.svg); }
    .icon-box::before { -webkit-mask-image: url(/static/svg/box.svg); mask-image: url(/static/svg/box.svg); }
    .icon-coffee::before { -webkit-mask-image: url(/static/svg/coffee.svg); mask-image: url(/static/svg/coffee.svg); }
    .icon-bar-chart::before { -webkit-mask-image: url(/static/svg/bar-chart.svg); mask-image: url(/static/svg/bar-chart.svg); }
    .icon-edit::before { -webkit-mask-image: url(/static/svg/edit.svg); mask-image: url(/static/svg/edit.svg); }
    .icon-link::before { -webkit-mask-image: url(/static/svg/link.svg); mask-image: url(/static/svg/link.svg); }
  </style>

  {% block head_extra %}{% endblock %}

  <!-- Theme Init -->
  <script>
    (function() {
      const theme = localStorage.getItem('site-theme') || 'sharp';
      if (theme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
</head>
<body>

  <!-- Navigation -->
  <nav class="site-nav">
    <div class="site-nav__inner">
      <a href="/" class="site-nav__logo">Iterate<span>.log</span></a>
      <ul class="site-nav__links">
        <li><a href="/">Home</a></li>
        <li><a href="/works">Works</a></li>
        <li><a href="/profile">Profile</a></li>
      </ul>
      <button class="theme-toggle" id="theme-toggle" title="デザインを切り替え" aria-label="デザインを切り替え">
        <svg class="theme-toggle__icon-sharp" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
        <svg class="theme-toggle__icon-dark" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
        </svg>
      </button>
    </div>
  </nav>

  <!-- Main -->
  <main class="site-main" id="main-content">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <p>&copy; 2026 <a href="/">Iterate.log</a> — 日々の学びを、積み重ねる。</p>
    <p style="margin-top: 8px; font-size: 0.7rem; opacity: 0.7;">
      Icons by <a href="https://icons8.com/" target="_blank" rel="noopener noreferrer">Icons8</a>
    </p>
  </footer>

  {% block scripts %}{% endblock %}

  <script>
    const themeToggle = document.getElementById('theme-toggle');
    themeToggle.addEventListener('click', () => {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      if (currentTheme === 'dark') {
        document.documentElement.removeAttribute('data-theme');
        localStorage.setItem('site-theme', 'sharp');
      } else {
        document.documentElement.setAttribute('data-theme', 'dark');
        localStorage.setItem('site-theme', 'dark');
      }
    });
  </script>
</body>
</html>
