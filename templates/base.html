<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Iterate.log — 日々の学びを積み重ねるポートフォリオサイト" />
  <title>{% block title %}Iterate.log{% endblock %}</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@600;700&display=swap" rel="stylesheet" />

  <style>
    /* ── CSS Custom Properties ─────────────────────────────── */
    :root {
      --color-bg:        #F8FAFC;
      --color-bg-soft:   #FFFFFF;
      --color-bg-card:   #FFFFFF;
      --color-text:      #1A365D;
      --color-text-soft: #4A5568;
      --color-accent:    #0CA678;
      --color-accent-soft: #0CA678;
      --color-border:    #4A5568;
      --color-border-light: #D7DEE7;

      --font-heading: 'Montserrat', 'Noto Sans JP', sans-serif;
      --font-body: 'Inter', 'Noto Sans JP', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --max-width: 720px;
      --radius-sm: 0px;
      --radius-md: 2px;
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.06);
      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ── Reset & Base ──────────────────────────────────────── */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font-body);
      color: var(--color-text);
      background-color: var(--color-bg);
      background-image:
        linear-gradient(135deg, rgba(74, 85, 104, 0.1) 1px, transparent 1px),
        linear-gradient(315deg, rgba(74, 85, 104, 0.08) 1px, transparent 1px);
      background-size: 28px 28px;
      line-height: 1.7;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Navigation ────────────────────────────────────────── */
    .site-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(248, 250, 252, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(74, 85, 104, 0.35);
    }

    .site-nav__inner {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .site-nav__logo {
      font-size: 1.15rem;
      font-weight: 700;
      font-family: var(--font-heading);
      color: var(--color-text);
      text-decoration: none;
      letter-spacing: -0.02em;
      transition: color var(--transition);
    }

    .site-nav__logo span {
      color: var(--color-accent);
    }

    .site-nav__logo:hover {
      color: var(--color-accent);
    }

    .site-nav__links {
      display: flex;
      gap: 24px;
      list-style: none;
    }

    .site-nav__links a {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--color-text-soft);
      text-decoration: none;
      position: relative;
      transition: color var(--transition);
    }

    .site-nav__links a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--color-accent);
      border-radius: 1px;
      transition: width var(--transition);
    }

    .site-nav__links a:hover {
      color: var(--color-text);
    }

    .site-nav__links a:hover::after {
      width: 100%;
    }

    /* ── Main Content ──────────────────────────────────────── */
    .site-main {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 48px 24px 96px;
      animation: fadeInUp 0.6s ease-out;
      position: relative;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── Footer ────────────────────────────────────────────── */
    .site-footer {
      text-align: center;
      padding: 32px 24px;
      font-size: 0.8rem;
      color: var(--color-text-soft);
      border-top: 1px solid var(--color-border-light);
    }

    .site-footer a {
      color: var(--color-accent);
      text-decoration: none;
    }

    /* ── Responsive ────────────────────────────────────────── */
    @media (max-width: 640px) {
      .site-nav__inner {
        padding: 0 16px;
      }

      .site-main {
        padding: 32px 16px 64px;
      }

      .site-nav__links {
        gap: 16px;
      }
    }
  </style>

  {% block head_extra %}{% endblock %}
</head>
<body>

  <!-- Navigation -->
  <nav class="site-nav">
    <div class="site-nav__inner">
      <a href="/" class="site-nav__logo">Iterate<span>.log</span></a>
      <ul class="site-nav__links">
        <li><a href="/">Home</a></li>
        <li><a href="/profile">Profile</a></li>
      </ul>
    </div>
  </nav>

  <!-- Main -->
  <main class="site-main" id="main-content">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <p>&copy; 2026 <a href="/">Iterate.log</a> — 日々の学びを、積み重ねる。</p>
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
